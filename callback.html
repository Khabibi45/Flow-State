<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>FlowState — Connexion Spotify</title>
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <style>
    body { background: #0a0a0f; color: #f0f0f5; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .msg { text-align: center; }
    .msg h2 { font-size: 1.5rem; margin-bottom: 8px; }
    .msg p { color: #8888a0; }
    .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #7c3aed; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <h2>Connexion Spotify...</h2>
    <p>Redirection en cours</p>
  </div>
  <script>
    // Extract token from URL hash
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const token = params.get('access_token');

    if (token) {
      localStorage.setItem('flowstate_spotify_token', token);
      // Redirect back to app
      window.location.href = 'index.html';
    } else {
      document.querySelector('.msg h2').textContent = 'Erreur de connexion';
      document.querySelector('.msg p').textContent = 'Impossible de se connecter à Spotify.';
      document.querySelector('.spinner').style.display = 'none';
      setTimeout(() => window.location.href = 'index.html', 3000);
    }
  </script>
</body>
</html>
