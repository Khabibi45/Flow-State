<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Page introuvable - FlowState">
    <title>404 - Page introuvable | FlowState</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="sitemap" type="application/xml" href="/sitemap.xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #6c5ce7, transparent 70%);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #00cec9, transparent 70%);
            bottom: -80px;
            right: -80px;
            animation-delay: -3s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #fd79a8, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(40px, 30px) scale(1.02); }
        }

        .orb-3 {
            animation-name: float-center;
        }

        @keyframes float-center {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            25% { transform: translate(-45%, -55%) scale(1.05); }
            50% { transform: translate(-55%, -45%) scale(0.95); }
            75% { transform: translate(-48%, -52%) scale(1.02); }
        }

        .container-404 {
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 2rem;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 14rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #6c5ce7, #00cec9, #fd79a8);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 4s ease-in-out infinite;
            margin-bottom: 1rem;
            letter-spacing: -0.05em;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .error-title {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #ffffff;
        }

        .error-message {
            font-size: clamp(0.95rem, 2vw, 1.15rem);
            color: #a0a0b0;
            margin-bottom: 2.5rem;
            max-width: 440px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-404 {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6c5ce7, #00cec9);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(108, 92, 231, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container-404">
        <div class="error-code">404</div>
        <h1 class="error-title">Page introuvable</h1>
        <p class="error-message">Cette page n'existe pas ou a été déplacée.</p>
        <div class="buttons">
            <a href="landing.html" class="btn-404 btn-primary">Retour à l'accueil</a>
            <a href="index.html" class="btn-404 btn-secondary">Lancer l'app</a>
        </div>
    </div>
</body>
</html>
