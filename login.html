<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowState — Connexion</title>
  <meta name="description" content="Connectez-vous a FlowState, votre espace de productivite ultime.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <link rel="apple-touch-icon" href="assets/icon.svg">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <!-- Toast Container -->
  <div class="auth-toast-container" id="toastContainer"></div>

  <!-- Auth Container -->
  <div class="auth-container">

    <!-- Auth Card -->
    <div class="auth-card">
      <div class="auth-card-glow"></div>

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-text">
          <span class="auth-logo-icon">&#9670;</span>
          FlowState
        </div>
        <span class="auth-logo-sub">Votre espace de productivite</span>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Connexion</button>
        <button class="auth-tab" data-tab="register">Inscription</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="loginForm" data-tab-content="login" novalidate>

        <div class="auth-form-group">
          <label for="loginEmail">Adresse email</label>
          <div class="auth-input-wrapper">
            <input type="email" id="loginEmail" class="auth-input" placeholder="vous@exemple.com" autocomplete="email">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </div>
          <div class="field-error" id="loginEmailError">Veuillez entrer un email valide</div>
        </div>

        <div class="auth-form-group">
          <label for="loginPassword">Mot de passe</label>
          <div class="auth-input-wrapper">
            <input type="password" id="loginPassword" class="auth-input" placeholder="Votre mot de passe" autocomplete="current-password">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <button type="button" class="password-toggle" tabindex="-1" aria-label="Afficher le mot de passe">
              <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="field-error" id="loginPasswordError">Le mot de passe est requis</div>
        </div>

        <div class="auth-options">
          <label class="auth-checkbox">
            <input type="checkbox" id="rememberMe">
            <span>Se souvenir de moi</span>
          </label>
          <a href="#" class="auth-link" onclick="showToast('Fonctionnalite bientot disponible', 'error'); return false;">Mot de passe oublie ?</a>
        </div>

        <button type="submit" class="auth-submit">
          Se connecter
        </button>

        <div class="auth-divider">
          <span>ou</span>
        </div>

        <div class="auth-social-buttons">
          <button type="button" class="auth-social-btn" onclick="loginWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continuer avec Google
          </button>
          <button type="button" class="auth-social-btn" onclick="loginWithGitHub()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            Continuer avec GitHub
          </button>
        </div>

      </form>

      <!-- Register Form -->
      <form class="auth-form" id="registerForm" data-tab-content="register" novalidate>

        <div class="auth-form-group">
          <label for="registerName">Nom complet</label>
          <div class="auth-input-wrapper">
            <input type="text" id="registerName" class="auth-input" placeholder="Jean Dupont" autocomplete="name">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="field-error" id="registerNameError">Le nom est requis</div>
        </div>

        <div class="auth-form-group">
          <label for="registerEmail">Adresse email</label>
          <div class="auth-input-wrapper">
            <input type="email" id="registerEmail" class="auth-input" placeholder="vous@exemple.com" autocomplete="email">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </div>
          <div class="field-error" id="registerEmailError">Veuillez entrer un email valide</div>
        </div>

        <div class="auth-form-group">
          <label for="registerPassword">Mot de passe</label>
          <div class="auth-input-wrapper">
            <input type="password" id="registerPassword" class="auth-input" placeholder="Minimum 6 caracteres" autocomplete="new-password">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <button type="button" class="password-toggle" tabindex="-1" aria-label="Afficher le mot de passe">
              <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="field-error" id="registerPasswordError">Minimum 6 caracteres</div>
          <div class="password-strength" id="passwordStrength" style="display:none;">
            <div class="strength-bar"><div class="strength-bar-fill" id="strengthBarFill"></div></div>
            <div class="strength-text" id="strengthText"></div>
          </div>
        </div>

        <div class="auth-form-group">
          <label for="registerPasswordConfirm">Confirmer le mot de passe</label>
          <div class="auth-input-wrapper">
            <input type="password" id="registerPasswordConfirm" class="auth-input" placeholder="Retapez votre mot de passe" autocomplete="new-password">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
          </div>
          <div class="field-error" id="registerPasswordConfirmError">Les mots de passe ne correspondent pas</div>
        </div>

        <label class="auth-cgu-label">
          <input type="checkbox" id="acceptCGU">
          <span>J'accepte les <a href="terms.html" class="auth-link" target="_blank">Conditions Generales d'Utilisation</a></span>
        </label>

        <button type="submit" class="auth-submit">
          Creer mon compte
        </button>

      </form>

    </div>

    <!-- Reassurance -->
    <p class="auth-reassurance">
      Version gratuite — Aucune carte requise
    </p>

    <!-- Back Link -->
    <a href="landing.html" class="auth-back">
      <svg width="16" height="16" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      Retour a l'accueil
    </a>

  </div>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!--
    GOOGLE OAUTH SETUP:
    1. Go to https://console.cloud.google.com/
    2. Create a project or select existing
    3. Go to APIs & Services > Credentials
    4. Create OAuth 2.0 Client ID (Web application)
    5. Add authorized JavaScript origins: http://localhost, http://localhost:3333, https://flowstate.app
    6. Add authorized redirect URIs: http://localhost/projets/productivity-hub/login.html
    7. Copy Client ID and replace GOOGLE_CLIENT_ID below
  -->

  <!--
    GITHUB OAUTH SETUP:
    1. Go to https://github.com/settings/developers
    2. New OAuth App
    3. Application name: FlowState
    4. Homepage URL: http://localhost
    5. Authorization callback URL: http://localhost/projets/productivity-hub/github-callback.html
    6. Copy Client ID below
  -->

  <script>
    // ── GitHub OAuth ──
    const GITHUB_CLIENT_ID = 'YOUR_GITHUB_CLIENT_ID'; // Replace with real GitHub OAuth App Client ID

    function loginWithGitHub() {
      const params = new URLSearchParams({
        client_id: GITHUB_CLIENT_ID,
        redirect_uri: window.location.origin + '/projets/productivity-hub/github-callback.html',
        scope: 'read:user user:email',
        state: Math.random().toString(36).substring(7),
      });
      window.location.href = `https://github.com/login/oauth/authorize?${params}`;
    }

    // ── Google OAuth ──
    const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com'; // Replace with real client ID

    function initGoogleAuth() {
      if (typeof google === 'undefined' || !google.accounts) {
        // GIS not loaded yet, retry
        setTimeout(initGoogleAuth, 500);
        return;
      }

      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleResponse,
        auto_select: false,
        cancel_on_tap_outside: true,
      });

      // Also render One Tap prompt
      google.accounts.id.prompt();
    }

    function handleGoogleResponse(response) {
      try {
        // Decode JWT payload (base64)
        const payload = JSON.parse(atob(response.credential.split('.')[1]));

        const user = {
          name: payload.name,
          email: payload.email,
          picture: payload.picture,
          provider: 'google',
          googleId: payload.sub,
          loginTime: Date.now(),
        };

        localStorage.setItem('flowstate_user', JSON.stringify(user));

        showToast(`Bienvenue ${payload.given_name} !`, 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      } catch (e) {
        showToast('Erreur de connexion Google', 'error');
        console.error('Google auth error:', e);
      }
    }

    // Trigger Google auth from custom button
    function loginWithGoogle() {
      if (typeof google !== 'undefined' && google.accounts) {
        google.accounts.id.prompt((notification) => {
          if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
            // One Tap not available, use popup flow
            google.accounts.oauth2.initTokenClient({
              client_id: GOOGLE_CLIENT_ID,
              scope: 'email profile',
              callback: (tokenResponse) => {
                // Fetch user info with the token
                fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                  headers: { Authorization: `Bearer ${tokenResponse.access_token}` }
                })
                .then(r => r.json())
                .then(userInfo => {
                  const user = {
                    name: userInfo.name,
                    email: userInfo.email,
                    picture: userInfo.picture,
                    provider: 'google',
                    googleId: userInfo.sub,
                    loginTime: Date.now(),
                  };
                  localStorage.setItem('flowstate_user', JSON.stringify(user));
                  showToast(`Bienvenue ${userInfo.given_name || userInfo.name} !`, 'success');
                  setTimeout(() => window.location.href = 'index.html', 1000);
                })
                .catch(() => showToast('Erreur de connexion', 'error'));
              },
            }).requestAccessToken();
          }
        });
      } else {
        showToast('Google Auth non disponible', 'error');
      }
    }

    // Initialize on load
    window.addEventListener('load', initGoogleAuth);

    // ── Init ──
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      const currentUser = localStorage.getItem('flowstate_user');
      if (currentUser) {
        window.location.href = 'index.html';
        return;
      }

      // Restore remembered email
      const rememberedEmail = localStorage.getItem('flowstate_remember_email');
      if (rememberedEmail) {
        document.getElementById('loginEmail').value = rememberedEmail;
        document.getElementById('rememberMe').checked = true;
      }

      // Init Lucide icons
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }
    });

    // ── Tab Switching ──
    const tabs = document.querySelectorAll('.auth-tab');
    const forms = document.querySelectorAll('.auth-form');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;

        // Update tabs
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        // Update forms
        forms.forEach(f => {
          f.classList.remove('active');
          if (f.dataset.tabContent === target) {
            f.classList.add('active');
          }
        });

        // Clear errors
        clearAllErrors();
      });
    });

    // ── Password Visibility Toggle ──
    document.querySelectorAll('.password-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.parentElement.querySelector('.auth-input');
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        // Swap icon
        btn.innerHTML = isPassword
          ? '<svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>'
          : '<svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>';
      });
    });

    // ── Password Strength ──
    const registerPassword = document.getElementById('registerPassword');
    const strengthContainer = document.getElementById('passwordStrength');
    const strengthBarFill = document.getElementById('strengthBarFill');
    const strengthText = document.getElementById('strengthText');

    registerPassword.addEventListener('input', () => {
      const val = registerPassword.value;
      if (!val) {
        strengthContainer.style.display = 'none';
        return;
      }
      strengthContainer.style.display = 'block';

      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      let level, label;
      if (score <= 2) { level = 'weak'; label = 'Faible'; }
      else if (score <= 3) { level = 'medium'; label = 'Moyen'; }
      else { level = 'strong'; label = 'Fort'; }

      strengthBarFill.className = 'strength-bar-fill ' + level;
      strengthText.className = 'strength-text ' + level;
      strengthText.textContent = label;
    });

    // ── Validation Helpers ──
    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showFieldError(inputId, errorId) {
      const input = document.getElementById(inputId);
      const error = document.getElementById(errorId);
      if (input) input.classList.add('error');
      if (error) error.classList.add('visible');
    }

    function clearFieldError(inputId, errorId) {
      const input = document.getElementById(inputId);
      const error = document.getElementById(errorId);
      if (input) input.classList.remove('error');
      if (error) error.classList.remove('visible');
    }

    function clearAllErrors() {
      document.querySelectorAll('.auth-input').forEach(i => i.classList.remove('error'));
      document.querySelectorAll('.field-error').forEach(e => e.classList.remove('visible'));
    }

    // Clear errors on input
    document.querySelectorAll('.auth-input').forEach(input => {
      input.addEventListener('input', () => {
        input.classList.remove('error');
        const errorEl = input.closest('.auth-form-group').querySelector('.field-error');
        if (errorEl) errorEl.classList.remove('visible');
      });
    });

    // ── Login Form Submit ──
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      clearAllErrors();

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const remember = document.getElementById('rememberMe').checked;
      let valid = true;

      if (!email || !isValidEmail(email)) {
        showFieldError('loginEmail', 'loginEmailError');
        valid = false;
      }

      if (!password) {
        showFieldError('loginPassword', 'loginPasswordError');
        valid = false;
      }

      if (!valid) return;

      // Check localStorage for user
      const users = JSON.parse(localStorage.getItem('flowstate_users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);

      if (!user) {
        showToast('Email ou mot de passe incorrect', 'error');
        return;
      }

      // Remember me
      if (remember) {
        localStorage.setItem('flowstate_remember_email', email);
      } else {
        localStorage.removeItem('flowstate_remember_email');
      }

      // Save current session
      localStorage.setItem('flowstate_user', JSON.stringify({
        name: user.name,
        email: user.email,
        loginAt: new Date().toISOString()
      }));

      showToast('Connexion reussie ! Redirection...', 'success');

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    });

    // ── Register Form Submit ──
    document.getElementById('registerForm').addEventListener('submit', (e) => {
      e.preventDefault();
      clearAllErrors();

      const name = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;
      const passwordConfirm = document.getElementById('registerPasswordConfirm').value;
      const acceptCGU = document.getElementById('acceptCGU').checked;
      let valid = true;

      if (!name) {
        showFieldError('registerName', 'registerNameError');
        valid = false;
      }

      if (!email || !isValidEmail(email)) {
        showFieldError('registerEmail', 'registerEmailError');
        valid = false;
      }

      if (!password || password.length < 6) {
        showFieldError('registerPassword', 'registerPasswordError');
        valid = false;
      }

      if (password !== passwordConfirm) {
        showFieldError('registerPasswordConfirm', 'registerPasswordConfirmError');
        valid = false;
      }

      if (!acceptCGU) {
        showToast('Veuillez accepter les CGU', 'error');
        valid = false;
      }

      if (!valid) return;

      // Check if user already exists
      const users = JSON.parse(localStorage.getItem('flowstate_users') || '[]');
      if (users.find(u => u.email === email)) {
        showToast('Un compte existe deja avec cet email', 'error');
        return;
      }

      // Save user
      users.push({ name, email, password, createdAt: new Date().toISOString() });
      localStorage.setItem('flowstate_users', JSON.stringify(users));

      // Auto-login
      localStorage.setItem('flowstate_user', JSON.stringify({
        name,
        email,
        loginAt: new Date().toISOString()
      }));

      showToast('Compte cree avec succes ! Redirection...', 'success');

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    });

    // ── Toast Function ──
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `auth-toast ${type}`;
      toast.innerHTML = `<span class="toast-dot"></span>${message}`;
      container.appendChild(toast);

      setTimeout(() => {
        toast.classList.add('leaving');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
  </script>

</body>
</html>
